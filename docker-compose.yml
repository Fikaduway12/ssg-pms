services:
  db:
    image: postgres:15
    container_name: ssg_pms_db
    restart: always
    environment:
      POSTGRES_DB: ssgpms
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ssgpms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssg_network

  backend:
    build: ./backend
    container_name: ssg_pms_backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_NAME: ssgpms
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: "1"
    networks:
      - ssg_network

  frontend:
    build: ./frontend
    container_name: ssg_pms_frontend
    restart: always
    ports:
      - "5173:5173"  # Changed from 3000:3000 to match Vite's default port
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    networks:
      - ssg_network

volumes:
  postgres_data:

networks:
  ssg_network:
    driver: bridge